name: publish
on:
  push:
    branches:
      - main
    paths:
      - 'src-tauri/tauri.conf.json'
  workflow_dispatch:

jobs:
  publish-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'
            args: '--target aarch64-apple-darwin'
          - platform: 'macos-latest'
            args: '--target x86_64-apple-darwin'
          - platform: 'ubuntu-22.04'
            args: ''
          - platform: 'windows-latest'
            args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.0-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf
          
      - name: Enable long paths for Windows
        if: matrix.platform == 'windows-latest'
        run: |
          git config --system core.longpaths true
          reg add "HKLM\SYSTEM\CurrentControlSet\Control\FileSystem" /v "LongPathsEnabled" /t REG_DWORD /d 1 /f

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: 'yarn'

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: install frontend dependencies
        run: yarn install

      # 1. Tauri標準ビルド（.msi を安全に生成）
      - name: Build Tauri App
        uses: tauri-apps/tauri-action@v0.5
        id: tauri_build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: app-v__VERSION__
          releaseName: 'App v__VERSION__'
          releaseBody: 'See the assets to download this version and install.'
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

      # 2. 【Windowsのみ】最新のMSIXHeroCLIを取得して .msi ➔ .msix へ自動変換
      - name: Convert MSI to MSIX (Windows only)
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          # GitHub APIから最新リリースのダウンロードURLを動的に取得（404を完全回避）
          $repo = "marcinotorowski/MSIXHeroCLI"
          $url = (Invoke-RestMethod -Uri "https://api.github.com/repos/$repo/releases/latest").assets | 
                 Where-Object { $_.name -like "*cli*.zip" -or $_.name -like "*MSIXHero*.zip" } | 
                 Select-Object -ExpandProperty browser_download_url -First 1
          
          Write-Host "Downloading MSIXHero CLI from: $url"
          Invoke-WebRequest -Uri $url -OutFile "msixhero.zip"
          Expand-Archive -Path "msixhero.zip" -DestinationPath "msixhero-cli" -Force
          
          # .msi ファイルの探索
          $msiFile = Get-ChildItem -Path "src-tauri/target/release/bundle/msi/*.msi" | Select-Object -First 1
          if (-not $msiFile) { throw "MSI file not found!" }
          
          # パッケージバージョンの動的取得（tauri.conf.json から抽出）
          $tauriConfig = Get-Content "src-tauri/tauri.conf.json" | ConvertFrom-Json
          $appVersion = $tauriConfig.version
          
          # 出力先ディレクトリの設定
          New-Item -ItemType Directory -Force -Path "src-tauri/target/release/bundle/msix" | Out-Null
          $msixOutput = (Resolve-Path "src-tauri/target/release/bundle/msix").Path + "\memoake.msix"
          
          # MSIXの生成（エスケープと変数参照を修正）
          & "./msixhero-cli/msixhero.exe" pack `
            --source "$($msiFile.FullName)" `
            --output "$msixOutput" `
            --package-name "memoake" `
            --package-publisher "CN=134e7ca2-77cb-4411-a232-81d75b2c179f" `
            --package-version "$appVersion"
            
          Write-Host "Successfully generated MSIX at: $msixOutput"

      # 3. 【Windowsのみ】生成された .msix ファイルを既存のリリースへ追加アップロード
      - name: Upload MSIX to GitHub Release (Windows only)
        if: matrix.platform == 'windows-latest'
        uses: softprops/action-gh-release@v2
        with:
          # tauri-actionが作成したタグを動的に追従
          tag_name: ${{ steps.tauri_build.outputs.releaseId == '' && 'app-v0.1.5' || format('app-v{0}', fromJson(steps.tauri_build.outputs.artifacts)[0].version) }}
          files: src-tauri/target/release/bundle/msix/memoake.msix
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}