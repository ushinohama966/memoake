name: publish
on:
  push:
    branches:
      - main
    paths:
      - 'src-tauri/tauri.conf.json'
  workflow_dispatch:

jobs:
  publish-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'
            args: '--target aarch64-apple-darwin'
          - platform: 'macos-latest'
            args: '--target x86_64-apple-darwin'
          - platform: 'ubuntu-22.04'
            args: ''
          - platform: 'windows-latest'
            args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.0-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf
          
      - name: Enable long paths for Windows
        if: matrix.platform == 'windows-latest'
        run: |
          git config --system core.longpaths true
          reg add "HKLM\SYSTEM\CurrentControlSet\Control\FileSystem" /v "LongPathsEnabled" /t REG_DWORD /d 1 /f

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: 'yarn'

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: install frontend dependencies
        run: yarn install

      - name: Build Tauri App
        uses: tauri-apps/tauri-action@v0.5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: app-v__VERSION__
          releaseName: 'App v__VERSION__'
          releaseBody: 'See the assets to download this version and install.'
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

      - name: Convert MSI to MSIX (Windows only)
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          # MSIXのパッケージングに必要な拡張CLIツールをダウンロード
          Invoke-WebRequest -Uri "https://github.com/marcinotorowski/MSIXHeroCLI/releases/download/v1.1.0/msixhero-cli.zip" -OutFile "msixhero.zip"
          Expand-Archive -Path "msixhero.zip" -DestinationPath "msixhero-cli"
          
          # Tauriがビルドした .msi ファイルのパスを自動探索
          $msiFile = Get-ChildItem -Path "src-tauri/target/release/bundle/msi/*.msi" | Select-Object -First 1
          if (-not $msiFile) { throw "MSI file not found!" }
          
          Write-Host "Found MSI: $($msiFile.FullName)"
          
          # MSIXの出力先ディレクトリを作成
          New-Item -ItemType Directory -Force -Path "src-tauri/target/release/bundle/msix"
          $msixOutput = "src-tauri/target/release/bundle/msix/memoake.msix"
          
          # MSIXHero CLIを使用して、MSIをMSIX構造に解凍・パッケージ変換
          # ストアのPublisher名（CN=...）をここに埋め込みます
          ./msixhero-cli/msixhero.exe pack `
            --source "$($msiFile.FullName)" `
            --output "$$msixOutput" `
            --package-name "memoake" `
            --package-publisher "CN=134e7ca2-77cb-4411-a232-81d75b2c179f" `
            --package-version "0.1.5"
            
          Write-Host "Successfully generated MSIX at: $$msixOutput"

      - name: Upload MSIX to GitHub Release (Windows only)
        if: matrix.platform == 'windows-latest'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: app-v0.1.5
          files: src-tauri/target/release/bundle/msix/memoake.msix
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}