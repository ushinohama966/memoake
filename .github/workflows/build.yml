name: publish
on:
  push:
    branches:
      - main
    paths:
      - 'src-tauri/tauri.conf.json'
  workflow_dispatch:

jobs:
  publish-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'
            args: '--target aarch64-apple-darwin'
          - platform: 'macos-latest'
            args: '--target x86_64-apple-darwin'
          - platform: 'ubuntu-22.04'
            args: ''
          - platform: 'windows-latest'
            args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.0-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf
          
      - name: Enable long paths for Windows
        if: matrix.platform == 'windows-latest'
        run: |
          git config --system core.longpaths true
          reg add "HKLM\SYSTEM\CurrentControlSet\Control\FileSystem" /v "LongPathsEnabled" /t REG_DWORD /d 1 /f

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: 'yarn'

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: install frontend dependencies
        run: yarn install

      # 1. Tauri標準ビルド（.msi を安全に生成）
      - name: Build Tauri App
        uses: tauri-apps/tauri-action@v0.5
        id: tauri_build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: app-v__VERSION__
          releaseName: 'App v__VERSION__'
          releaseBody: 'See the assets to download this version and install.'
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

      # 2. 【Windowsのみ】Windows標準のMSIXツールで安全にパッケージング
      - name: Convert MSI to MSIX (Windows only)
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          # 1. 成果物のパスとバージョンの取得
          $msiFile = Get-ChildItem -Path "src-tauri/target/release/bundle/msi/*.msi" | Select-Object -First 1
          if (-not $msiFile) { throw "MSI file not found!" }
          $tauriConfig = Get-Content "src-tauri/tauri.conf.json" | ConvertFrom-Json
          $appVersion = $tauriConfig.version
          
          # 2. 作業用ディレクトリの設定
          $stageDir = (Resolve-Path ".").Path + "\src-tauri\target\release\bundle\msix_stage"
          $outDir = (Resolve-Path ".").Path + "\src-tauri\target\release\bundle\msix"
          New-Item -ItemType Directory -Force -Path $stageDir | Out-Null
          New-Item -ItemType Directory -Force -Path $outDir | Out-Null
          
          # 3. MSIから中身を確実にアンパック（プロセス完了を同期的に待機）
          Write-Host "Unpacking MSI..."
          $msiProcess = Start-Process -FilePath "msiexec.exe" -ArgumentList "/a `"$($msiFile.FullName)`" /qb TARGETDIR=`"$stageDir`"" -Wait -PassThru
          if ($msiProcess.ExitCode -ne 0 -and $msiProcess.ExitCode -ne 1603) { 
              throw "MSI unpack failed with exit code $($msiProcess.ExitCode)" 
          }
          
          # 💡 展開完了を念のため1秒待機
          Start-Sleep -Seconds 1
          
          # 4. 展開された中身から.exeを全探索し、ルート直下にリネームして引っ張り出す
          $exeFile = Get-ChildItem -Path "$stageDir" -Filter "*.exe" -Recurse | Select-Object -First 1
          if (-not $exeFile) { 
              Get-ChildItem -Path "$stageDir" -Recurse | Select-Object -Property FullName | Out-String | Write-Host
              throw "No .exe file found inside the unpacked MSI!" 
          }
          
          Write-Host "Found source executable: $($exeFile.FullName)"
          # MakeAppxが確実に認識するよう、ルート直下に固定名「memoake.exe」として配置
          $targetExePath = "$stageDir\memoake.exe"
          if ($exeFile.FullName -ne $targetExePath) {
              Copy-Item -Path $exeFile.FullName -Destination $targetExePath -Force
          }
          
          # 5. AppxManifest.xml の生成
          $manifestContent = @"
          <?xml version="1.0" encoding="utf-8"?>
          <Package 
            xmlns="http://schemas.microsoft.com/appx/manifest/foundation/windows10" 
            xmlns:uap="http://schemas.microsoft.com/appx/manifest/uap/windows10" 
            xmlns:rescap="http://schemas.microsoft.com/appx/manifest/foundation/windows10/restrictedcapabilities"
            IgnorableNamespaces="uap rescap">
            
            <Identity Name="memoake" Publisher="CN=134e7ca2-77cb-4411-a232-81d75b2c179f" Version="$appVersion.0" ProcessorArchitecture="x64" />
            
            <Properties>
              <DisplayName>memoake</DisplayName>
              <PublisherDisplayName>memoake</PublisherDisplayName>
              <Logo>icon.png</Logo>
            </Properties>
            
            <Resources>
              <Resource Language="en-us"/>
            </Resources>
            
            <Dependencies>
              <TargetDeviceFamily Name="Windows.Universal" MinVersion="10.0.17763.0" MaxVersionTested="10.0.22000.0" />
            </Dependencies>
            
            <Applications>
              <Application Id="App" Executable="memoake.exe" EntryPoint="Windows.FullTrustApplication">
                <uap:VisualElements DisplayName="memoake" Description="memoake" BackgroundColor="transparent" Square150x150Logo="icon.png" Square44x44Logo="icon.png">
                  <uap:DefaultTile Wide310x150Logo="icon.png" />
                </uap:VisualElements>
              </Application>
            </Applications>
            
            <Capabilities>
              <rescap:Capability Name="runFullTrust" />
            </Capabilities>
          </Package>
          "@
          
          # アイコンのコピーとマニフェスト保存
          Copy-Item "src-tauri/icons/32x32.png" "$stageDir/icon.png" -ErrorAction SilentlyContinue
          $manifestContent | Set-Content "$stageDir/AppxManifest.xml" -Encoding UTF8
          
          # 6. Windows SDK標準の MakeAppx でパッケージング
          Write-Host "Packaging to MSIX using Windows SDK..."
          & "C:\Program Files (x86)\Windows Kits\10\App Certification Kit\MakeAppx.exe" pack /d $stageDir /p "$outDir\memoake.msix" /o
          
          if ($LASTEXITCODE -ne 0) { throw "MakeAppx failed with exit code $LASTEXITCODE" }
          Write-Host "Successfully generated MSIX via standard Windows tools!"

      # 3. 【Windowsのみ】生成された .msix ファイルをリリースへ追加アップロード
      - name: Upload MSIX to GitHub Release (Windows only)
        if: matrix.platform == 'windows-latest'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tauri_build.outputs.releaseId == '' && 'app-v0.1.5' || format('app-v{0}', fromJson(steps.tauri_build.outputs.artifacts)[0].version) }}
          files: src-tauri/target/release/bundle/msix/memoake.msix
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}